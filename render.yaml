services:
  - type: web
    name: delegation-contract-be
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPERATOR_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
